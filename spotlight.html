<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Featured Stories — Live Projects 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { margin: 0; padding: 0; }

  :root {
    --navy: #080e1f;
    --navy-2: #0d1630;
    --navy-3: #111d3c;
    --card-bg: rgba(14, 22, 46, 0.85);
    --card-border: rgba(100, 140, 255, 0.15);
    --accent-blue: #3b82f6;
    --accent-cyan: #22d3ee;
    --accent-violet: #a78bfa;
    --text-primary: #f0f4ff;
    --text-secondary: #8b9cc0;
    --text-muted: #5a6a8a;
    --tag-ai: #22d3ee;
    --tag-ms: #6366f1;
    --tag-geo: #10b981;
  }

  html, body {
    min-height: 100%;
    background: transparent;
    color: var(--text-primary);
    font-family: 'Plus Jakarta Sans', sans-serif;
    overflow-x: hidden;
  }

  /* ─── Canvas Background ─── */
  #bg-canvas {
    display: none;
  }

  /* ─── Mesh Glow ─── */
  .mesh {
    display: none;
  }

  /* ─── Layout ─── */
  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    padding: 0 0 80px;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* ─── Header ─── */
  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 999px;
    padding: 7px 18px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-primary);
    margin-bottom: 32px;
    animation: fadeDown 0.6s ease both;
  }

  .live-badge .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent-cyan);
    animation: pulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.75); }
  }

  .headline-wrap {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 56px;
    gap: 24px;
  }

  .headline {
    font-family: 'Sora', sans-serif;
    font-weight: 800;
    line-height: 1.0;
    animation: fadeDown 0.7s 0.1s ease both;
  }

  .headline .line1 {
    font-size: clamp(36px, 4.5vw, 56px);
    color: var(--text-primary);
    display: block;
    letter-spacing: -0.03em;
  }

  .headline .line2 {
    font-size: clamp(36px, 4.5vw, 56px);
    display: block;
    letter-spacing: -0.03em;
    background: linear-gradient(90deg, #22d3ee 0%, #818cf8 45%, #c084fc 75%, #a78bfa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 20px;
    padding-top: 8px;
    animation: fadeDown 0.7s 0.2s ease both;
  }

  .hint-bubble {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px 14px 3px 14px;
    padding: 10px 16px;
    font-size: 13px;
    color: var(--text-secondary);
    backdrop-filter: blur(8px);
  }

  .robot-wrap {
    position: relative;
  }

  .robot-glow {
    position: absolute;
    inset: -16px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(59,130,246,0.25) 0%, transparent 70%);
    animation: roboGlow 3s ease-in-out infinite;
  }

  @keyframes roboGlow {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.15); opacity: 1; }
  }

  .robot-emoji {
    font-size: 64px;
    display: block;
    position: relative;
    filter: drop-shadow(0 0 20px rgba(59,130,246,0.5));
    animation: roboFloat 4s ease-in-out infinite;
  }

  @keyframes roboFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  /* ─── Cards Grid ─── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    animation: fadeUp 0.8s 0.3s ease both;
  }

  /* ─── Card ─── */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    overflow: hidden;
    backdrop-filter: blur(16px);
    cursor: pointer;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1),
                box-shadow 0.4s ease,
                border-color 0.4s ease;
    will-change: transform;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 20px;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }

  .card-1::before { background: linear-gradient(135deg, rgba(59,130,246,0.08) 0%, transparent 60%); }
  .card-2::before { background: linear-gradient(135deg, rgba(99,102,241,0.08) 0%, transparent 60%); }
  .card-3::before { background: linear-gradient(135deg, rgba(59,130,246,0.08) 0%, transparent 60%); }

  .card:hover::before { opacity: 1; }

  .card-1:hover { transform: translateY(-8px) rotate(-0.5deg); border-color: rgba(59,130,246,0.45); box-shadow: 0 24px 60px rgba(59,130,246,0.15), 0 8px 20px rgba(0,0,0,0.5); }
  .card-2:hover { transform: translateY(-8px); border-color: rgba(99,102,241,0.4); box-shadow: 0 24px 60px rgba(99,102,241,0.14), 0 8px 20px rgba(0,0,0,0.5); }
  .card-3:hover { transform: translateY(-8px) rotate(0.5deg); border-color: rgba(59,130,246,0.45); box-shadow: 0 24px 60px rgba(59,130,246,0.15), 0 8px 20px rgba(0,0,0,0.5); }

  /* ─── Card Image ─── */
  .card-img {
    height: 240px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }

  .card-img-inner {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 56px;
    transition: transform 0.5s ease;
    position: relative;
  }

  .card:hover .card-img-inner { transform: scale(1.06); }

  .img-bg-1 { background: linear-gradient(135deg, #0a2040 0%, #0d3060 50%, #082030 100%); }
  .img-bg-2 { background: linear-gradient(135deg, #1a1040 0%, #1e1060 50%, #100828 100%); }
  .img-bg-3 { background: linear-gradient(135deg, #051a35 0%, #0a1f5e 50%, #071540 100%); }

  .img-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(8,14,31,0.45) 0%, transparent 40%, rgba(8,14,31,0.85) 100%);
  }

  .card-tag {
    position: absolute;
    top: 14px;
    left: 14px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 999px;
    backdrop-filter: blur(8px);
    z-index: 2;
  }

  .tag-1 { background: rgba(8,14,31,0.75); border: 1px solid rgba(96,165,250,0.6); color: #93c5fd; backdrop-filter: blur(8px); }
  .tag-2 { background: rgba(8,14,31,0.75); border: 1px solid rgba(129,140,248,0.6); color: #c7d2fe; backdrop-filter: blur(8px); }
  .tag-3 { background: rgba(8,14,31,0.75); border: 1px solid rgba(96,165,250,0.6); color: #93c5fd; backdrop-filter: blur(8px); }

  /* Scene illustrations */
  .scene {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  .scene-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 8px;
    padding: 24px;
    width: 100%;
    height: 100%;
  }

  .scene-block {
    border-radius: 8px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }

  .scene-block.tall {
    grid-row: span 2;
    font-size: 32px;
  }

  .scene-block.wide {
    grid-column: span 2;
  }

  /* Map scene */
  .map-scene {
    width: 100%;
    height: 100%;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .map-placeholder {
    flex: 1;
    border-radius: 10px;
    background: rgba(16,185,129,0.08);
    border: 1px solid rgba(16,185,129,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .map-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(16,185,129,0.1) 1px, transparent 1px),
      linear-gradient(90deg, rgba(16,185,129,0.1) 1px, transparent 1px);
    background-size: 20px 20px;
  }

  .map-pin {
    position: absolute;
    font-size: 20px;
    animation: pingAnim 2s ease-in-out infinite;
  }

  .map-pin:nth-child(2) { top: 30%; left: 40%; animation-delay: 0.5s; }
  .map-pin:nth-child(3) { top: 55%; left: 65%; animation-delay: 1s; font-size: 16px; }
  .map-pin:nth-child(4) { top: 45%; left: 25%; animation-delay: 1.5s; font-size: 14px; }

  @keyframes pingAnim {
    0%, 100% { transform: scale(1); opacity: 0.9; }
    50% { transform: scale(1.2); opacity: 1; }
  }

  /* Copilot scene */
  .copilot-screen {
    background: rgba(10,12,30,0.9);
    border: 1px solid rgba(99,102,241,0.2);
    border-radius: 12px;
    margin: 20px;
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .screen-bar {
    height: 28px;
    background: rgba(99,102,241,0.15);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 6px;
    flex-shrink: 0;
  }

  .bar-dot { width: 7px; height: 7px; border-radius: 50%; }

  .screen-content {
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
  }

  .chat-row {
    height: 10px;
    border-radius: 4px;
    background: rgba(255,255,255,0.08);
  }

  .chat-row.short { width: 55%; }
  .chat-row.medium { width: 75%; }
  .chat-row.long { width: 90%; }
  .chat-row.accent { background: rgba(99,102,241,0.3); width: 65%; }

  /* ─── Card Body ─── */
  .card-body {
    padding: 24px;
    display: flex;
    flex-direction: column;
    flex: 1;
    gap: 0;
  }

  .card-category {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .cat-1 { color: #60a5fa; }
  .cat-2 { color: #818cf8; }
  .cat-3 { color: #60a5fa; }

  .card-title {
    font-family: 'Sora', sans-serif;
    font-size: 20px;
    font-weight: 700;
    line-height: 1.2;
    color: var(--text-primary);
    margin-bottom: 12px;
    letter-spacing: -0.01em;
  }

  .card-desc {
    font-size: 13.5px;
    line-height: 1.65;
    color: var(--text-secondary);
    margin-bottom: 20px;
    flex: 1;
  }

  /* ─── Stats ─── */
  .stats-row {
    display: flex;
    gap: 20px;
    margin-bottom: 22px;
    padding-top: 18px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .stat-value {
    font-family: 'Sora', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1;
  }

  .stat-label {
    font-size: 9.5px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    line-height: 1.3;
  }

  /* ─── CTA Button ─── */
  .cta-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 18px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.04);
    color: var(--text-primary);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 12.5px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.25s ease, border-color 0.25s ease, transform 0.2s ease;
    text-decoration: none;
  }

  .card-1 .cta-btn:hover { background: rgba(34,211,238,0.1); border-color: rgba(34,211,238,0.35); }
  .card-2 .cta-btn:hover { background: rgba(99,102,241,0.12); border-color: rgba(99,102,241,0.4); }
  .card-3 .cta-btn:hover { background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.35); }

  .cta-btn:hover { transform: translateX(2px); }

  .arrow {
    font-size: 16px;
    transition: transform 0.25s ease;
  }

  .cta-btn:hover .arrow { transform: translateX(4px); }

  /* ─── Animations ─── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .pill-row {
    margin-top: auto;
    padding-top: 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    padding: 5px 14px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .pill-cyan   { background: rgba(59,130,246,0.12); border: 1px solid rgba(59,130,246,0.3); color: #60a5fa; }
  .pill-indigo { background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.35); color: #818cf8; }
  .pill-emerald{ background: rgba(59,130,246,0.12); border: 1px solid rgba(59,130,246,0.3); color: #60a5fa; }

  /* ─── Sparkles ─── */
  .card-body {
    position: relative;
    overflow: hidden;
  }

  .sparkle {
    position: absolute;
    pointer-events: none;
    width: 6px;
    height: 6px;
    opacity: 0;
    animation: sparkleAnim var(--dur) ease-in-out infinite;
    animation-delay: var(--delay);
  }

  .sparkle::before,
  .sparkle::after {
    content: '';
    position: absolute;
    background: var(--spark-color);
    border-radius: 999px;
  }

  .sparkle::before {
    width: 100%; height: 2px;
    top: 50%; left: 0;
    transform: translateY(-50%);
  }

  .sparkle::after {
    width: 2px; height: 100%;
    left: 50%; top: 0;
    transform: translateX(-50%);
  }

  @keyframes sparkleAnim {
    0%   { opacity: 0; transform: scale(0.4) rotate(0deg); }
    30%  { opacity: 1; transform: scale(1) rotate(45deg); }
    60%  { opacity: 0.6; transform: scale(0.8) rotate(90deg); }
    100% { opacity: 0; transform: scale(0.3) rotate(135deg); }
  }

  /* ─── Video Section ─── */
  .video-section {
    margin-top: 0;
    text-align: center;
  }

  .video-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 999px;
    padding: 7px 18px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-primary);
    margin-bottom: 24px;
  }

  .video-title {
    font-family: 'Sora', sans-serif;
    font-size: clamp(28px, 4vw, 48px);
    font-weight: 800;
    color: var(--text-primary);
    letter-spacing: -0.02em;
    line-height: 1.15;
    margin-bottom: 14px;
  }

  .video-title-accent {
    background: linear-gradient(90deg, #22d3ee 0%, #818cf8 50%, #c084fc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .video-subtitle {
    font-size: 15px;
    color: var(--text-secondary);
    max-width: 560px;
    margin: 0 auto 40px;
    line-height: 1.7;
  }

  .video-wrap {
    position: relative;
    max-width: 900px;
    margin: 0 auto;
  }

  .video-glow {
    position: absolute;
    inset: -30px;
    border-radius: 32px;
    background: radial-gradient(ellipse at center, rgba(59,130,246,0.15) 0%, rgba(167,139,250,0.08) 50%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .video-container {
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.12);
    background: #080e1f;
    z-index: 1;
    cursor: pointer;
  }

  .video-thumb {
    width: 100%;
    display: block;
    aspect-ratio: 16/9;
    object-fit: cover;
  }

  .video-overlay {
    position: absolute;
    inset: 0;
    background: rgba(8,14,31,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.3s ease;
  }

  .video-container:hover .video-overlay {
    background: rgba(8,14,31,0.2);
  }

  .play-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    background: none;
    border: none;
    cursor: pointer;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }

  .play-btn:hover { transform: scale(1.08); }

  .play-icon {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.4);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.3s ease, border-color 0.3s ease;
  }

  .play-btn:hover .play-icon {
    background: rgba(59,130,246,0.3);
    border-color: rgba(96,165,250,0.7);
  }

  .play-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.9);
  }

  .video-duration {
    position: absolute;
    bottom: 16px;
    right: 16px;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(6px);
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 6px;
  }

  .video-caption {
    position: absolute;
    top: 12px;
    left: 12px;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(6px);
    color: rgba(255,255,255,0.7);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 6px;
  }

  /* ─── Case Study Section ─── */
  .case-section {
    margin-top: 64px;
    background: #ffffff;
    border-radius: 24px;
    overflow: hidden;
  }

  .case-inner {
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 420px;
  }

  .case-text {
    padding: 52px 48px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 0;
  }

  .case-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .case-spotlight {
    display: inline-flex;
    align-items: center;
    background: rgba(236,72,153,0.10);
    border: 1px solid rgba(236,72,153,0.35);
    color: #ec4899;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 999px;
  }

  .case-chapter {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #1e3a8a;
  }

  .case-divider {
    color: #cbd5e1;
    font-size: 14px;
  }

  .case-cat {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #94a3b8;
  }

  .case-title {
    font-family: 'Sora', sans-serif;
    font-size: clamp(28px, 3.5vw, 44px);
    font-weight: 800;
    color: #0f172a;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 16px;
  }

  .case-title-sub {
    color: #1e3a8a;
  }

  .case-desc {
    font-size: 14px;
    line-height: 1.75;
    color: #475569;

<body>

<canvas id="bg-canvas"></canvas>
<div class="mesh"></div>

<div class="page">




  <!-- ─── Case Study Section ─── -->
  <div class="case-section">
    <div class="case-inner">
      <div class="case-watermark">JOURNEY</div>

      <!-- Left: Text -->

        <div class="case-meta">
          <span class="case-spotlight">● &nbsp;Spotlight</span>
        </div>

      </div>

    </div>

<script>
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H, stars = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function initStars() {
  stars = [];
  const N = Math.floor((W * H) / 6000);
  for (let i = 0; i < N; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.4 + 0.2,
      a: Math.random(),
      speed: Math.random() * 0.004 + 0.001,
      phase: Math.random() * Math.PI * 2
    });
  }
}

function draw(t) {
  ctx.clearRect(0, 0, W, H);
  for (const s of stars) {
    const alpha = s.a * (0.5 + 0.5 * Math.sin(t * s.speed * 1000 + s.phase));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(180,200,255,${alpha})`;
    ctx.fill();
  }
  requestAnimationFrame(draw);
}

window.addEventListener('resize', () => { resize(); initStars(); });
resize();
initStars();
requestAnimationFrame(draw);

// 3D tilt on cards
document.querySelectorAll('.card').forEach(card => {
  card.addEventListener('mousemove', e => {
    const r = card.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width - 0.5;
    const y = (e.clientY - r.top) / r.height - 0.5;
    card.style.transform = `perspective(800px) rotateY(${x * 6}deg) rotateX(${-y * 6}deg) translateY(-8px)`;
  });
  card.addEventListener('mouseleave', () => {
    card.style.transform = '';
  });
});
</script>
